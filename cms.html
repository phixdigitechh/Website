    <script>
        // Sovereign Editor Initialization
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Manifest your high-performance brand-wisdom here...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    [{ 'align': [] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        let currentTab = 'blogs';
        let items = [];
        let galleryURLs = ["","","","","","",""];
        let blogImageURL = "";
        let logoURL = "";

        function handleLogin() {
            if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin') {
                gsap.to('#auth-layer', { opacity: 0, pointerEvents: 'none', duration: 0.8 });
                document.getElementById('dashboard').style.display = 'block';
                gsap.to('#dashboard', { opacity: 1, y: 0, duration: 1, delay: 0.4 });
                fetchItems();
            }
        }

        async function fetchItems() {
            try {
                const res = await fetch(`/api/${currentTab}`);
                if (res.ok) {
                    items = await res.json();
                } else {
                    const fallback = await fetch(`/${currentTab}.json`);
                    items = await fallback.json();
                }
            } catch (e) {
                try {
                    const fallback = await fetch(`/${currentTab}.json`);
                    items = await fallback.json();
                } catch(err) {
                    items = [];
                }
            }
            renderList();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            let t = 'BLOG ARCHIVE';
            if (tab === 'portfolio') t = 'CLIENT CASE STUDIES';
            if (tab === 'services') t = 'CORE SERVICES';
            document.getElementById('list-title').textContent = t;
            
            document.querySelectorAll('.section-editor').forEach(s => s.classList.remove('active'));
            document.getElementById(`editor-${tab}`).classList.add('active');

            fetchItems();
            newItem();
        }

        function renderList() {
            let listTitle = 'BLOG ARCHIVE';
            if (currentTab === 'portfolio') listTitle = 'CLIENT CASE STUDIES';
            if (currentTab === 'services') listTitle = 'CORE SERVICES API';
            document.getElementById('list-title').textContent = listTitle;
            
            document.getElementById('item-list').innerHTML = items.map(i => `
                <div class="list-item" onclick="editItem('${i.id}')">
                    <span>${i.title || i.name || i.btnText}</span>
                    <span class="status-badge s-${i.status || 'draft'}">${i.status || 'draft'}</span>
                </div>
            `).join('');
        }

        async function uploadImage(e, index) {
            const formData = new FormData();
            formData.append('image', e.target.files[0]);
            
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (index === 'blog') {
                blogImageURL = data.url;
                document.getElementById('blog-preview').src = blogImageURL;
                document.getElementById('blog-preview-container').style.display = 'block';
            } else if (index === 'logo') {
                logoURL = data.url;
                document.getElementById('logo-preview').src = logoURL;
                document.getElementById('logo-preview-container').style.display = 'block';
            } else {
                galleryURLs[index] = data.url;
                document.getElementById(`p-preview-${index}`).src = galleryURLs[index];
            }
        }

        function editItem(id) {
            const i = items.find(x => x.id === id);
            document.getElementById('edit-id').value = i.id;
            document.getElementById('edit-slug').value = i.slug;
            document.getElementById('edit-status').value = i.status || 'draft';
            quill.root.innerHTML = i.content || '';
            document.getElementById('edit-seo-title').value = i.seoTitle || '';
            document.getElementById('edit-seo-desc').value = i.seoDesc || '';
            
            if (currentTab === 'portfolio') {
                document.getElementById('port-name').value = i.name;
                document.getElementById('port-year').value = i.year || '';
                document.getElementById('port-cat').value = i.category || '';
                document.getElementById('port-scope').value = i.scope || '';
                document.getElementById('port-stat').value = i.stat || '';
                logoURL = i.logo || "";
                if (logoURL) {
                    document.getElementById('logo-preview').src = logoURL;
                    document.getElementById('logo-preview-container').style.display = 'block';
                } else {
                    document.getElementById('logo-preview-container').style.display = 'none';
                    document.getElementById('logo-preview').src = "";
                }
                galleryURLs = i.images || ["","","","","","",""];
                galleryURLs.forEach((url, idx) => document.getElementById(`p-preview-${idx}`).src = url || "");
            } else if (currentTab === 'services') {
                document.getElementById('svc-btnText').value = i.btnText || '';
                document.getElementById('svc-title').value = i.title || '';
                document.getElementById('svc-description').value = i.description || '';
                document.getElementById('svc-points').value = (i.points || []).join(', ');
            } else {
                document.getElementById('blog-title').value = i.title;
                blogImageURL = i.image || "";
                if (blogImageURL) {
                    document.getElementById('blog-preview').src = blogImageURL;
                    document.getElementById('blog-preview-container').style.display = 'block';
                }
            }
        }

        function newItem() {
            document.getElementById('master-editor').reset();
            document.getElementById('edit-id').value = Date.now().toString();
            quill.root.innerHTML = '';
            galleryURLs = ["","","","","","",""];
            blogImageURL = "";
            logoURL = "";
            document.getElementById('logo-preview-container').style.display = 'none';
            document.getElementById('logo-preview').src = "";
            document.getElementById('blog-preview').src = "";
            document.getElementById('blog-preview-container').style.display = 'none';
            for(let i=0; i<7; i++) document.getElementById(`p-preview-${i}`).src = "";
            document.getElementById('svc-btnText').value = '';
            document.getElementById('svc-title').value = '';
            document.getElementById('svc-description').value = '';
            document.getElementById('svc-points').value = '';
        }

        async function saveItem() {
            const i = {
                id: document.getElementById('edit-id').value,
                slug: document.getElementById('edit-slug').value,
                status: document.getElementById('edit-status').value,
                content: quill.root.innerHTML,
                seoTitle: document.getElementById('edit-seo-title').value,
                seoDesc: document.getElementById('edit-seo-desc').value,
                date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
            };

            if (currentTab === 'portfolio') {
                i.name = document.getElementById('port-name').value;
                i.year = document.getElementById('port-year').value;
                i.category = document.getElementById('port-cat').value;
                i.scope = document.getElementById('port-scope').value;
                i.stat = document.getElementById('port-stat').value;
                i.logo = logoURL;
                i.images = galleryURLs;
            } else if (currentTab === 'services') {
                i.btnText = document.getElementById('svc-btnText').value;
                i.title = document.getElementById('svc-title').value;
                i.description = document.getElementById('svc-description').value;
                i.points = document.getElementById('svc-points').value.split(',').map(p => p.trim()).filter(Boolean);
            } else {
                i.title = document.getElementById('blog-title').value;
                i.image = blogImageURL;
            }

            await fetch(`/api/${currentTab}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(i)
            });
            fetchItems();
            alert("Sovereign Node Saved.");
        }

        async function previewItem() {
            await saveItem(); // Ensure data exists in the bedrock first
            const id = document.getElementById('edit-id').value;
            const target = currentTab === 'blogs' ? 'blog-post.html' : 'client-detail.html';
            window.open(`${target}?id=${id}&preview=true`, '_blank');
        }
    </script>
</body>
</html>
